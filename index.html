<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project AAAI+ — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --accent: #06b6d4;
      --dark: #0f172a;
      --dark2: #1e293b;
      --border: rgba(255,255,255,0.08);
      --muted: #94a3b8;
      --grad: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
    .blob1 { width: 500px; height: 500px; background: #2563eb; top: -150px; left: -150px; }
    .blob2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -100px; }

    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; margin: 0 auto 1rem;
    }
    .brand h1 {
      font-size: 1.5rem; font-weight: 800;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

    /* Form */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-heading { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.78rem 1rem;
      color: #e2e8f0; font-size: 0.9rem; font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .forgot-link {
      text-align: right; margin-top: -0.5rem; margin-bottom: 1.1rem;
    }
    .forgot-link a {
      font-size: 0.78rem; color: #60a5fa; text-decoration: none; cursor: pointer;
    }
    .forgot-link a:hover { text-decoration: underline; }

    .btn-main {
      width: 100%; background: var(--grad); color: #fff;
      border: none; border-radius: 10px; padding: 0.85rem;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 20px rgba(37,99,235,0.3);
    }
    .btn-main:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Switch tabs */
    .switch-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-top: 1.25rem;
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .switch-btn {
      flex: 1; padding: 0.6rem; border: none; background: transparent;
      color: var(--muted); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .switch-btn.active { background: var(--grad); color: #fff; }
    .switch-sep { width: 1px; background: var(--border); height: 100%; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.25rem 0; color: var(--muted); font-size: 0.75rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Demo button */
    .btn-demo {
      width: 100%; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 10px; padding: 0.78rem;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-demo:hover { border-color: rgba(255,255,255,0.2); color: #e2e8f0; background: rgba(255,255,255,0.04); }

    /* Forgot password panel */
    .forgot-panel {
      display: none;
    }
    .forgot-panel.active { display: block; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: #60a5fa; cursor: pointer;
      margin-bottom: 1.25rem; background: none; border: none;
      font-family: inherit; padding: 0;
    }
    .back-link:hover { text-decoration: underline; }

    /* Messages */
    .msg {
      border-radius: 8px; padding: 0.65rem 1rem;
      font-size: 0.82rem; margin-bottom: 1rem; display: none;
    }
    .msg.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
    .msg.success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #4ade80; }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">💳</div>
      <h1>Project AAAI+</h1>
      <p>AI-Powered Credit Rating System</p>
    </div>

    <!-- ── LOG IN ── -->
    <div class="form-panel active" id="panel-login">
      <div class="form-heading">Log In</div>
      <div class="msg error" id="loginErr"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" />
      </div>
      <div class="forgot-link">
        <a onclick="showForgot()">Forgot password?</a>
      </div>
      <button class="btn-main" onclick="handleLogin()">Log In</button>

      <p style="text-align:center; margin-top:1.1rem; font-size:0.82rem; color:var(--muted);">
        Don't have an account? <a onclick="switchTab('register')" style="color:#60a5fa; cursor:pointer;">Register</a>
      </p>

      <div class="divider">or</div>
      <button class="btn-demo" onclick="demoLogin()">🎮 Try Demo</button>
    </div>

    <!-- ── REGISTER ── -->
    <div class="form-panel" id="panel-register">
      <div class="form-heading">Create Account</div>
      <div class="msg error" id="regErr"></div>
      <div class="msg success" id="regSuccess"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Create a password (min 6 chars)" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regPass2" placeholder="Repeat password" />
      </div>
      <button class="btn-main" onclick="handleRegister()">Create Account</button>

      <p style="text-align:center; margin-top:1.1rem; font-size:0.82rem; color:var(--muted);">
        Already have an account? <a onclick="switchTab('login')" style="color:#60a5fa; cursor:pointer;">Log In</a>
      </p>

      <div class="divider">or</div>
      <button class="btn-demo" onclick="demoLogin()">🎮 Try Demo</button>
    </div>

    <!-- ── FORGOT PASSWORD ── -->
    <div class="form-panel" id="panel-forgot">
      <button class="back-link" onclick="showLogin()">← Back to Log In</button>
      <div class="form-heading">Reset Password</div>
      <div class="msg error" id="forgotErr"></div>
      <div class="msg success" id="forgotSuccess"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="Enter your registered email" />
      </div>
      <div class="form-group" id="newPassGroup" style="display:none;">
        <label>New Password</label>
        <input type="password" id="newPass" placeholder="Enter new password" />
      </div>
      <div class="form-group" id="newPass2Group" style="display:none;">
        <label>Confirm New Password</label>
        <input type="password" id="newPass2" placeholder="Repeat new password" />
      </div>
      <button class="btn-main" id="forgotBtn" onclick="handleForgot()">Send Reset Link</button>
    </div>

  </div>

  <script>
    let forgotStep = 1;

    function switchTab(tab) {
      hideAll();
      document.getElementById('panel-' + tab).classList.add('active');
    }
    function hideAll() {
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    }
    function showForgot() { hideAll(); document.getElementById('panel-forgot').classList.add('active'); forgotStep = 1; resetForgotUI(); }
    function showLogin()  { hideAll(); document.getElementById('panel-login').classList.add('active'); }

    function resetForgotUI() {
      document.getElementById('forgotErr').style.display = 'none';
      document.getElementById('forgotSuccess').style.display = 'none';
      document.getElementById('newPassGroup').style.display  = 'none';
      document.getElementById('newPass2Group').style.display = 'none';
      document.getElementById('forgotBtn').textContent = 'Verify Email';
      document.getElementById('forgotEmail').value = '';
      document.getElementById('newPass').value  = '';
      document.getElementById('newPass2').value = '';
    }

    function handleForgot() {
      const err  = document.getElementById('forgotErr');
      const ok   = document.getElementById('forgotSuccess');
      err.style.display = 'none'; ok.style.display = 'none';

      if (forgotStep === 1) {
        const email = document.getElementById('forgotEmail').value.trim();
        if (!email) { err.textContent = 'Please enter your email.'; err.style.display = 'block'; return; }
        const users = JSON.parse(localStorage.getItem('creditai_users') || '{}');
        if (!users[email]) { err.textContent = 'No account found with this email.'; err.style.display = 'block'; return; }
        ok.textContent = 'Email verified! Enter your new password below.';
        ok.style.display = 'block';
        document.getElementById('newPassGroup').style.display  = 'block';
        document.getElementById('newPass2Group').style.display = 'block';
        document.getElementById('forgotBtn').textContent = 'Reset Password';
        document.getElementById('forgotEmail').disabled = true;
        forgotStep = 2;
      } else {
        const email = document.getElementById('forgotEmail').value.trim();
        const p1 = document.getElementById('newPass').value;
        const p2 = document.getElementById('newPass2').value;
        if (!p1 || !p2) { err.textContent = 'Please fill in both password fields.'; err.style.display = 'block'; return; }
        if (p1 !== p2)  { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
        if (p1.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
        ok.style.display = 'none';
        const users = JSON.parse(localStorage.getItem('creditai_users') || '{}');
        users[email] = p1;
        localStorage.setItem('creditai_users', JSON.stringify(users));
        document.getElementById('newPassGroup').style.display  = 'none';
        document.getElementById('newPass2Group').style.display = 'none';
        document.getElementById('forgotBtn').style.display = 'none';
        const s = document.getElementById('forgotSuccess');
        s.textContent = 'Password reset! Redirecting to log in...';
        s.style.display = 'block';
        setTimeout(() => { showLogin(); document.getElementById('loginEmail').value = email; document.getElementById('forgotBtn').style.display = ''; }, 2000);
      }
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPass').value;
      const err   = document.getElementById('loginErr');
      if (!email || !pass) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }
      err.style.display = 'none';
      const users = JSON.parse(localStorage.getItem('creditai_users') || '{}');
      if (users[email] !== undefined && users[email] !== pass) {
        err.textContent = 'Incorrect password.'; err.style.display = 'block'; return;
      }
      sessionStorage.setItem('user_email', email);
      sessionStorage.setItem('user_initial', email.charAt(0).toUpperCase());
      window.location.href = 'dashboard.html';
    }

    function handleRegister() {
      const email = document.getElementById('regEmail').value.trim();
      const pass  = document.getElementById('regPass').value;
      const pass2 = document.getElementById('regPass2').value;
      const err   = document.getElementById('regErr');
      const ok    = document.getElementById('regSuccess');
      err.style.display = 'none'; ok.style.display = 'none';
      if (!email || !pass || !pass2) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
      if (pass !== pass2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
      if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
      const users = JSON.parse(localStorage.getItem('creditai_users') || '{}');
      if (users[email] !== undefined) { err.textContent = 'An account with this email already exists.'; err.style.display = 'block'; return; }
      users[email] = pass;
      localStorage.setItem('creditai_users', JSON.stringify(users));
      ok.textContent = 'Account created! Switching to log in...';
      ok.style.display = 'block';
      setTimeout(() => { switchTab('login'); document.getElementById('loginEmail').value = email; }, 1500);
    }

    function demoLogin() {
      sessionStorage.setItem('user_email', 'demo@aaaiplus.com');
      sessionStorage.setItem('user_initial', 'D');
      window.location.href = 'dashboard.html';
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.form-panel.active');
      if (!active) return;
      const id = active.id;
      if (id === 'panel-login')    handleLogin();
      else if (id === 'panel-register') handleRegister();
      else if (id === 'panel-forgot')   handleForgot();
    });
  </script>
</body>
</html>
