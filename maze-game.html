<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Quest</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#2e5c14;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:'Segoe UI',sans-serif; color:#e8f5e9; user-select:none;
  padding:14px; overflow-x:auto;
}

/* ── Avatar Selection ── */
#avs {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at 40% 50%,#0e2a06 0%,#051000 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px; z-index:100; transition:opacity .5s;
}
#avs.out { opacity:0; pointer-events:none; }
#avs h1 { font-size:1.9rem; letter-spacing:5px; text-transform:uppercase; color:#a5d6a7; text-shadow:0 0 28px #66bb6a66; }
#avs .sub { font-size:.8rem; color:#3a7a28; letter-spacing:2px; }
#avcards { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
.avc {
  width:110px; background:#0d1e08; border:2px solid #224a14;
  border-radius:14px; overflow:hidden; cursor:pointer; transition:all .22s;
  display:flex; flex-direction:column; align-items:center;
}
.avc:hover { border-color:var(--c); box-shadow:0 0 22px var(--c)44,0 6px 24px #00000077; transform:translateY(-6px) scale(1.03); }
.avc canvas { display:block; }
.avc-info { padding:8px 4px 10px; text-align:center; }
.avc-name { font-size:.88rem; font-weight:700; color:var(--c); letter-spacing:1px; }
.avc-role { font-size:.62rem; color:#3a6028; margin-top:2px; }

/* ── Game: two-column layout ── */
#game { display:none; flex-direction:row; align-items:flex-start; gap:16px; }
#game.on { display:flex; }

/* ── Left column ── */
#game-left { display:flex; flex-direction:column; align-items:center; gap:10px; }

#topbar { width:610px; display:flex; align-items:center; justify-content:space-between; padding:0 4px; }
#badge-box { display:flex; align-items:center; gap:9px; }
#badge-box canvas { border-radius:8px; border:1.5px solid #2a5a18; }
#badge-box span { font-size:.82rem; font-weight:700; color:#a5d6a7; }

#journey { display:flex; align-items:center; gap:4px; }
.jstop {
  width:34px; height:22px; border-radius:7px;
  border:1.5px solid #2a5a18; display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700; color:#2a5a18; transition:all .3s;
}
.jstop.lit { background:var(--c); border-color:var(--c); color:#051000; box-shadow:0 0 10px var(--c); transform:scale(1.15); }
.jarrow { font-size:.65rem; color:#2a5a18; }

#mapbox { position:relative; border-radius:12px; overflow:hidden; box-shadow:0 8px 48px #00000088; }
canvas#map { display:block; cursor:default; }
#hint { font-size:.7rem; color:#4a8a30; letter-spacing:.5px; text-align:center; }

/* ── Win overlay ── */
#win {
  display:none; position:absolute; inset:0; background:#021002cc; backdrop-filter:blur(8px);
  flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:20; border-radius:12px;
}
#win.show { display:flex; }
#win canvas { border-radius:12px; box-shadow:0 0 32px #66bb6a44; }
#win h2 { font-size:1.5rem; color:#a5d6a7; text-shadow:0 0 22px #66bb6a; letter-spacing:3px; }
#win p { color:#4a7a38; font-size:.82rem; }
.wb { padding:9px 24px; background:transparent; border:2px solid #81c784; color:#81c784; border-radius:22px; font-size:.8rem; letter-spacing:2px; cursor:pointer; transition:all .18s; }
.wb:hover { background:#81c784; color:#021002; }

/* ── Right column ── */
#game-right {
  width:310px; display:flex; flex-direction:column; gap:14px;
  max-height:calc(100vh - 28px); overflow-y:auto;
}
#game-right::-webkit-scrollbar { width:4px; }
#game-right::-webkit-scrollbar-thumb { background:#2a5a18; border-radius:4px; }

/* ── Notepad ── */
#notepad {
  background:#fffef5;
  border-radius:10px;
  box-shadow:3px 4px 18px #00000055, inset 0 0 0 1px #d8d0a8;
  overflow:hidden;
  position:relative;
  color:#2a2010;
}

/* Spiral binding bar */
#notepad::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0; width:34px;
  background:linear-gradient(to right,#e0d8b8,#ede5c8);
  border-right:2px solid #c8b880;
  z-index:1;
}

/* Spiral holes — static in HTML, positioned absolute */
#spiral-holes {
  position:absolute;
  left:10px; top:0; bottom:0; width:14px;
  z-index:3;
  display:flex; flex-direction:column;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}
.spiral-hole {
  width:13px; height:13px;
  border-radius:50%;
  background:#2e5c14;
  border:2px solid #a89868;
  flex-shrink:0;
}

#notepad-header {
  position:relative; z-index:2;
  background:linear-gradient(135deg,#f0ecd8,#e8e0c0);
  border-bottom:2px solid #d0c090;
  padding:9px 12px 9px 42px;
  display:flex; justify-content:space-between; align-items:center;
  gap:8px;
}
.np-title {
  font-size:.82rem; font-weight:700;
  color:#5a4828; letter-spacing:1px; white-space:nowrap;
}
.np-btn-row { display:flex; gap:6px; }
.np-btn {
  padding:4px 11px; font-size:.68rem; font-weight:700;
  border:1.5px solid; border-radius:12px; cursor:pointer;
  transition:all .15s; letter-spacing:.5px;
  font-family:'Segoe UI',sans-serif; background:transparent;
}
#btn-edit { border-color:#8a7040; color:#8a7040; }
#btn-edit:hover, #btn-edit.active { background:#8a7040; color:#fff; }
#btn-save { border-color:#2e7a18; color:#2e7a18; }
#btn-save:hover { background:#2e7a18; color:#fff; }

/* Task lines area */
#task-lines {
  position:relative; z-index:2;
  padding:0 10px 6px 56px;
  background:#fffef5;
}
/* Red margin line */
#task-lines::before {
  content:'';
  position:absolute;
  left:52px; top:0; bottom:0;
  width:1.5px; background:#e07070;
}

.task-row {
  display:flex; align-items:center; gap:7px;
  height:31px;
  border-bottom:1px solid #ddd8c0;
}
.task-row input[type=checkbox] {
  width:14px; height:14px; flex-shrink:0;
  accent-color:#4a8a30; cursor:pointer;
}
.task-inp {
  flex:1; background:transparent;
  border:none; outline:none;
  font-family:'Courier New',monospace;
  font-size:.75rem; color:#2a2010; padding:0;
}
.task-inp::placeholder { color:#c8c0a0; }
.task-inp.done { text-decoration:line-through; color:#aaa; }

/* Progress label inside notepad */
#np-progress {
  position:relative; z-index:2;
  background:#f5f0de;
  border-top:1px solid #d8d0a8;
  padding:5px 12px 5px 56px;
  font-size:.68rem; color:#7a6840; letter-spacing:.4px;
}

/* ── Calendar ── */
#calendar-wrap {
  background:#0a1a06;
  border-radius:10px;
  border:1.5px solid #1e4414;
  padding:12px;
  color:#a5d6a7;
}
#cal-title {
  font-size:.78rem; font-weight:700; letter-spacing:1.5px;
  color:#66bb6a; text-align:left;
}
#cal-months { display:flex; flex-direction:column; gap:14px; }

.cal-month-title {
  font-size:.73rem; font-weight:700; color:#81c784;
  text-align:center; margin-bottom:5px; letter-spacing:.8px;
}
.cal-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-dh {
  font-size:.54rem; font-weight:700; color:#2a5a18;
  text-align:center; padding:2px 0;
}
.cal-day {
  font-size:.64rem; text-align:center;
  padding:4px 1px; border-radius:4px;
  cursor:pointer; color:#5a9a5a; transition:all .14s;
  min-height:22px; display:flex; align-items:center; justify-content:center;
  position:relative;
}
.cal-day:hover:not(.empty) { background:#1a3a10; color:#a5d6a7; }
.cal-day.today { border:1px solid #44cc78; color:#a5d6a7; font-weight:700; }
.cal-day.selected { background:#2a6a18; color:#fff; font-weight:700; box-shadow:0 0 8px #44cc7866; }
.cal-day.has-tasks::after {
  content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%; background:#66cc66;
}
.cal-day.empty { cursor:default; color:transparent; }

/* Day task panel */
#day-panel {
  margin-top:12px;
  background:#061006;
  border:1px solid #1a4214;
  border-radius:8px;
  padding:10px 10px 10px;
}
#day-panel-title {
  font-size:.73rem; font-weight:700; color:#66bb6a;
  margin-bottom:7px; letter-spacing:.4px;
}
.dtr {
  display:flex; align-items:center; gap:7px;
  padding:3px 0; border-bottom:1px solid #142814;
}
.dtr input[type=checkbox] {
  width:12px; height:12px; flex-shrink:0;
  accent-color:#44bb44; cursor:pointer;
}
.dtr-inp {
  flex:1; background:transparent;
  border:none; outline:none;
  font-family:'Segoe UI',sans-serif;
  font-size:.71rem; color:#88d488; padding:0;
}
.dtr-inp::placeholder { color:#1e4a1e; }
.dtr-inp.done { text-decoration:line-through; color:#2a6a2a; }
#day-save-btn {
  margin-top:8px; width:100%;
  padding:5px; font-size:.69rem;
  background:transparent; border:1px solid #2a6a18;
  color:#66bb6a; border-radius:6px; cursor:pointer;
  font-family:'Segoe UI',sans-serif; letter-spacing:.5px; transition:all .15s;
}
#day-save-btn:hover { background:#2a6a18; color:#fff; }
</style>
</head>
<body>

<!-- Avatar selection -->
<div id="avs">
  <h1>Office Quest</h1>
  <div class="sub">Choose your professional</div>
  <div id="avcards"></div>
</div>

<!-- Game: two-column -->
<div id="game">

  <!-- LEFT: maze canvas -->
  <div id="game-left">
    <div id="topbar">
      <div id="badge-box">
        <canvas id="badge" width="34" height="46"></canvas>
        <span id="bname"></span>
      </div>
      <div id="journey">
        <div class="jstop" id="j0" style="--c:#ff6633">A4</div>
        <div class="jarrow">›</div>
        <div class="jstop" id="j1" style="--c:#ffaa22">A3</div>
        <div class="jarrow">›</div>
        <div class="jstop" id="j2" style="--c:#44aaff">A2</div>
        <div class="jarrow">›</div>
        <div class="jstop" id="j3" style="--c:#ffdd44">🏠</div>
      </div>
    </div>

    <div id="mapbox">
      <canvas id="map" width="610" height="360"></canvas>
      <div id="win">
        <canvas id="wc" width="90" height="120"></canvas>
        <h2>WELCOME HOME!</h2>
        <p id="wmsg"></p>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="wb" onclick="restartGame()">Play Again</button>
          <button class="wb" onclick="goSelect()">Change Avatar</button>
        </div>
      </div>
    </div>

    <p id="hint">✔ Check tasks on the right to advance your journey!</p>
  </div>

  <!-- RIGHT: notepad + calendar -->
  <div id="game-right">

    <!-- Notepad -->
    <div id="notepad">
      <div id="spiral-holes">
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
        <div class="spiral-hole"></div><div class="spiral-hole"></div>
      </div>
      <div id="notepad-header">
        <span class="np-title">📋 Today's Tasks</span>
        <div class="np-btn-row">
          <button class="np-btn" id="btn-edit" onclick="setEditMode(true)">✏ Edit</button>
          <button class="np-btn" id="btn-save" onclick="saveTasks()">Save</button>
        </div>
      </div>
      <div id="task-lines"></div>
      <div id="np-progress"></div>
    </div>

    <!-- Calendar -->
    <div id="calendar-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div id="cal-title" style="margin-bottom:0;">📅 Upcoming Schedule</div>
        <button onclick="document.getElementById('calendar-wrap').style.display='none'"
          style="width:20px;height:20px;border-radius:50%;background:#0d2208;border:1px solid #2a5a18;
          color:#66bb6a;font-size:11px;cursor:pointer;display:flex;align-items:center;
          justify-content:center;flex-shrink:0;line-height:1;" title="Close calendar">✕</button>
      </div>
      <div id="cal-months"></div>
      <div id="day-panel" style="display:none">
        <div id="day-panel-title"></div>
        <div id="day-task-lines"></div>
        <button id="day-save-btn" onclick="saveDayTasks()">Save</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── Avatars ───────────────────────────────────────────────────────
const AVS = {
  simba:  {name:'Simba',  role:'Senior Analyst',    emoji:'🦁', suit:'#1e3d80', tie:'#c8a800', face:'#40300a', glow:'#5588ff'},
  croro:  {name:'Croro',  role:'Risk Manager',      emoji:'🐊', suit:'#1a4a2c', tie:'#8b5018', face:'#0a2810', glow:'#44cc78'},
  leo:    {name:'Leo',    role:'Portfolio Lead',    emoji:'🐆', suit:'#3e1e58', tie:'#dd4400', face:'#3a2208', glow:'#cc55ff'},
  cheeka: {name:'Cheeka', role:'Research Director', emoji:'🐅', suit:'#581818', tie:'#c8c000', face:'#281408', glow:'#ff6644'},
};
const AVKEYS = ['simba','croro','leo','cheeka'];

// ── Road path ─────────────────────────────────────────────────────
const RPTS = [
  {x:40, y:192},{x:112,y:108},{x:178,y:272},{x:248,y:102},
  {x:318,y:268},{x:392,y:106},{x:458,y:272},{x:524,y:136},{x:574,y:196},
];

// ── Game nodes ────────────────────────────────────────────────────
const NODES = [
  {id:0, x:40,  y:192, t:'start', label:'START', sub:'Entrance'},
  {id:1, x:178, y:272, t:'cp', ci:0, label:'A4', sub:'Finance Dept', nc:'#ff6633'},
  {id:2, x:318, y:268, t:'cp', ci:1, label:'A3', sub:'Research Lab', nc:'#ffaa22'},
  {id:3, x:458, y:272, t:'cp', ci:2, label:'A2', sub:'Board Room',   nc:'#44aaff'},
  {id:4, x:574, y:196, t:'home', label:'A1', sub:'HQ Home'},
];

// ── Trees ─────────────────────────────────────────────────────────
const TREES = [
  {x:18,y:34,r:11},{x:56,y:22,r:9},{x:92,y:44,r:12},{x:132,y:26,r:8},{x:168,y:46,r:10},
  {x:208,y:24,r:9},{x:244,y:44,r:11},{x:280,y:22,r:8},{x:316,y:40,r:10},{x:354,y:24,r:9},
  {x:394,y:44,r:12},{x:434,y:22,r:8},{x:468,y:40,r:10},{x:506,y:24,r:11},{x:544,y:42,r:9},{x:582,y:26,r:10},
  {x:28,y:72,r:8},{x:68,y:60,r:9},{x:108,y:76,r:10},{x:148,y:62,r:8},{x:188,y:76,r:9},
  {x:228,y:62,r:10},{x:268,y:76,r:8},{x:308,y:60,r:9},{x:348,y:74,r:10},{x:388,y:60,r:8},
  {x:428,y:76,r:9},{x:466,y:62,r:10},{x:504,y:76,r:8},{x:542,y:60,r:9},{x:578,y:72,r:10},
  {x:22,y:308,r:11},{x:60,y:322,r:9},{x:98,y:310,r:12},{x:138,y:326,r:8},{x:175,y:310,r:10},
  {x:212,y:326,r:9},{x:250,y:310,r:11},{x:288,y:326,r:8},{x:325,y:310,r:10},{x:362,y:326,r:9},
  {x:400,y:310,r:12},{x:438,y:326,r:8},{x:475,y:310,r:10},{x:512,y:325,r:11},{x:550,y:310,r:9},{x:588,y:322,r:8},
  {x:38,y:344,r:8},{x:78,y:352,r:9},{x:118,y:342,r:8},{x:158,y:352,r:9},{x:198,y:342,r:8},
  {x:238,y:352,r:9},{x:278,y:342,r:8},{x:318,y:352,r:10},{x:358,y:342,r:8},{x:398,y:352,r:9},
  {x:438,y:342,r:8},{x:478,y:352,r:10},{x:518,y:342,r:8},{x:558,y:352,r:9},{x:596,y:344,r:8},
];

// ── Canvas ────────────────────────────────────────────────────────
const mc = document.getElementById('map');
const mx = mc.getContext('2d');
const CW = mc.width, CH = mc.height;

// ── Game state ────────────────────────────────────────────────────
let cur = 0, coll = [false,false,false], avk = 'simba';

// ── Task state ────────────────────────────────────────────────────
let todayTasks = [];
let calTasks   = {};   // 'YYYY-MM-DD' → [{text,done}×10]
let selectedDay = null;
let editMode = false;

// ── Node from completed-task count ────────────────────────────────
function nodeFromCount(n) {
  if (n >= 10) return 4;
  if (n >= 8)  return 3;
  if (n >= 5)  return 2;
  if (n >= 3)  return 1;
  return 0;
}

// ── Sync avatar position to task state ────────────────────────────
function syncAvatar() {
  const count = todayTasks.filter(t => t.done).length;
  const target = nodeFromCount(count);
  coll[0] = target >= 1;
  coll[1] = target >= 2;
  coll[2] = target >= 3;
  cur = target;
  updateJourney();
  render();
  if (target === 4) setTimeout(showWin, 450);
  // progress label
  const labels = ['Start','A4 unlocked!','A3 unlocked!','A2 unlocked!','Home! 🎉'];
  document.getElementById('np-progress').textContent =
    count + '/10 tasks done · ' + labels[target];
}

// ── localStorage ─────────────────────────────────────────────────
function loadState() {
  try { const t = localStorage.getItem('oq_today'); if(t) todayTasks = JSON.parse(t); } catch(e){}
  try { const c = localStorage.getItem('oq_cal');   if(c) calTasks   = JSON.parse(c); } catch(e){}
  if (todayTasks.length !== 10)
    todayTasks = Array.from({length:10}, () => ({text:'', done:false}));
}
function saveState() {
  localStorage.setItem('oq_today', JSON.stringify(todayTasks));
  localStorage.setItem('oq_cal',   JSON.stringify(calTasks));
}

// ── Notepad rendering ─────────────────────────────────────────────
function renderNotepad() {
  const wrap = document.getElementById('task-lines');
  wrap.innerHTML = '';
  todayTasks.forEach((task, i) => {
    const row = document.createElement('div');
    row.className = 'task-row';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = task.done;
    cb.onchange = () => {
      todayTasks[i].done = cb.checked;
      inp.className = 'task-inp' + (cb.checked ? ' done' : '');
      saveState();
      syncAvatar();
    };

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'task-inp' + (task.done ? ' done' : '');
    inp.value = task.text;
    inp.placeholder = 'Task ' + (i + 1) + '…';
    inp.readOnly = !editMode;
    inp.oninput = () => { todayTasks[i].text = inp.value; };

    row.appendChild(cb);
    row.appendChild(inp);
    wrap.appendChild(row);
  });
}

function setEditMode(on) {
  editMode = on;
  document.getElementById('btn-edit').classList.toggle('active', on);
  renderNotepad();
  if (on) {
    const inputs = document.querySelectorAll('.task-inp');
    const first = Array.from(inputs).find(el => !el.value);
    if (first) first.focus();
  }
}

function saveTasks() {
  document.querySelectorAll('.task-inp').forEach((el, i) => {
    todayTasks[i].text = el.value;
  });
  saveState();
  setEditMode(false);
  // brief feedback
  const btn = document.getElementById('btn-save');
  btn.textContent = 'Saved ✓';
  setTimeout(() => { btn.textContent = 'Save'; }, 1200);
}

// ── Calendar ──────────────────────────────────────────────────────
function renderCalendar() {
  const wrap = document.getElementById('cal-months');
  wrap.innerHTML = '';
  const now = new Date();
  [0, 1].forEach(offset => {
    const base  = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const yr    = base.getFullYear();
    const mo    = base.getMonth();
    const name  = base.toLocaleString('default', {month:'long'});
    const days  = new Date(yr, mo + 1, 0).getDate();
    const start = new Date(yr, mo, 1).getDay(); // 0=Sun

    const div = document.createElement('div');
    div.className = 'cal-month';

    const title = document.createElement('div');
    title.className = 'cal-month-title';
    title.textContent = name + ' ' + yr;
    div.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // Weekday headers
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(h => {
      const hdr = document.createElement('div');
      hdr.className = 'cal-dh';
      hdr.textContent = h;
      grid.appendChild(hdr);
    });

    // Empty leading cells
    for (let i = 0; i < start; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      grid.appendChild(e);
    }

    // Day cells
    for (let d = 1; d <= days; d++) {
      const ds = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;
      if (yr===now.getFullYear() && mo===now.getMonth() && d===now.getDate())
        cell.classList.add('today');
      if (selectedDay === ds) cell.classList.add('selected');
      if (calTasks[ds] && calTasks[ds].some(t => t.text)) cell.classList.add('has-tasks');
      cell.onclick = () => selectDay(ds);
      grid.appendChild(cell);
    }

    div.appendChild(grid);
    wrap.appendChild(div);
  });
}

function selectDay(ds) {
  selectedDay = ds;
  renderCalendar();
  renderDayPanel();
}

function renderDayPanel() {
  const panel = document.getElementById('day-panel');
  if (!selectedDay) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';

  const d = new Date(selectedDay + 'T00:00:00');
  document.getElementById('day-panel-title').textContent =
    d.toLocaleDateString('default', {weekday:'short', month:'short', day:'numeric', year:'numeric'});

  if (!calTasks[selectedDay])
    calTasks[selectedDay] = Array.from({length:10}, () => ({text:'', done:false}));

  const lines = document.getElementById('day-task-lines');
  lines.innerHTML = '';
  calTasks[selectedDay].forEach((task, i) => {
    const row = document.createElement('div');
    row.className = 'dtr';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = task.done;
    cb.onchange = () => {
      calTasks[selectedDay][i].done = cb.checked;
      inp.className = 'dtr-inp' + (cb.checked ? ' done' : '');
      saveState();
    };

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'dtr-inp' + (task.done ? ' done' : '');
    inp.value = task.text;
    inp.placeholder = 'Task ' + (i + 1) + '…';
    inp.oninput = () => { calTasks[selectedDay][i].text = inp.value; };

    row.appendChild(cb);
    row.appendChild(inp);
    lines.appendChild(row);
  });
}

function saveDayTasks() {
  if (!selectedDay) return;
  document.querySelectorAll('#day-task-lines .dtr-inp').forEach((el, i) => {
    calTasks[selectedDay][i].text = el.value;
  });
  saveState();
  renderCalendar();
  const btn = document.getElementById('day-save-btn');
  btn.textContent = 'Saved ✓';
  setTimeout(() => { btn.textContent = 'Save'; }, 1200);
}

// ── Color helpers ─────────────────────────────────────────────────
function h2r(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function dk(h,p){const [r,g,b]=h2r(h);return `rgb(${~~(r*(1-p))},${~~(g*(1-p))},${~~(b*(1-p))})`;}
function lt(h,p){const [r,g,b]=h2r(h);return `rgb(${~~Math.min(255,r+(255-r)*p)},${~~Math.min(255,g+(255-g)*p)},${~~Math.min(255,b+(255-b)*p)})`;}

// ── Portrait ─────────────────────────────────────────────────────
function portrait(c, av, mini=false){
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2;
  ctx.clearRect(0,0,w,h);
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#14201a'); bg.addColorStop(1,'#0a1408');
  ctx.fillStyle=bg;
  ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(0,0,w,h,mini?6:10); else ctx.rect(0,0,w,h);
  ctx.fill();
  const st=h*(mini?.45:.50);
  ctx.fillStyle=av.suit;
  ctx.beginPath(); ctx.moveTo(cx,st+h*.07); ctx.lineTo(cx-w*.22,st); ctx.lineTo(cx-w*.35,h+2); ctx.lineTo(cx,h+2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,st+h*.07); ctx.lineTo(cx+w*.22,st); ctx.lineTo(cx+w*.35,h+2); ctx.lineTo(cx,h+2); ctx.fill();
  ctx.fillStyle='#f0ece5';
  ctx.beginPath(); ctx.moveTo(cx-w*.07,st+h*.05); ctx.lineTo(cx+w*.07,st+h*.05); ctx.lineTo(cx+w*.06,h+2); ctx.lineTo(cx-w*.06,h+2); ctx.fill();
  ctx.fillStyle=lt(av.suit,.2);
  ctx.beginPath(); ctx.moveTo(cx,st+h*.07); ctx.lineTo(cx-w*.11,st+h*.03); ctx.lineTo(cx-w*.06,st+h*.17); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,st+h*.07); ctx.lineTo(cx+w*.11,st+h*.03); ctx.lineTo(cx+w*.06,st+h*.17); ctx.closePath(); ctx.fill();
  ctx.fillStyle=av.tie;
  const tk=st+h*.07;
  ctx.beginPath(); ctx.moveTo(cx-w*.055,tk); ctx.lineTo(cx+w*.055,tk); ctx.lineTo(cx+w*.075,tk+h*.17); ctx.lineTo(cx,tk+h*.31); ctx.lineTo(cx-w*.075,tk+h*.17); ctx.closePath(); ctx.fill();
  ctx.fillStyle=dk(av.tie,.25); ctx.beginPath(); ctx.ellipse(cx,tk,w*.048,h*.027,0,0,Math.PI*2); ctx.fill();
  if(!mini){ctx.fillStyle=lt(av.tie,.5); ctx.fillRect(cx-w*.28,st+h*.04,w*.07,h*.04);}
  const hr=w*(mini?.27:.24),hy=h*(mini?.3:.33);
  ctx.shadowBlur=mini?6:16; ctx.shadowColor=av.glow+'88';
  ctx.beginPath(); ctx.arc(cx,hy,hr,0,Math.PI*2); ctx.fillStyle=av.face; ctx.fill(); ctx.shadowBlur=0;
  ctx.font=`${hr*1.38}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(av.emoji,cx,hy+1);
  if(!mini){
    ctx.fillStyle='#ffffff0c'; ctx.fillRect(3,h-20,w-6,17);
    ctx.fillStyle='#a5d6a7'; ctx.font=`bold 7.5px 'Segoe UI'`;
    ctx.textAlign='center'; ctx.fillText(av.role.toUpperCase(),cx,h-10);
  }
}

function buildCards(){
  const wrap=document.getElementById('avcards'); wrap.innerHTML='';
  AVKEYS.forEach(k=>{
    const av=AVS[k];
    const card=document.createElement('div'); card.className='avc'; card.style.setProperty('--c',av.glow); card.onclick=()=>startGame(k);
    const c=document.createElement('canvas'); c.width=90; c.height=120; card.appendChild(c);
    const info=document.createElement('div'); info.className='avc-info';
    info.innerHTML=`<div class="avc-name">${av.name}</div><div class="avc-role">${av.role}</div>`;
    card.appendChild(info); wrap.appendChild(card); portrait(c,av);
  });
}

// ── Path helpers ──────────────────────────────────────────────────
function smoothStroke(pts,lw,col){
  mx.beginPath(); mx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++)
    mx.quadraticCurveTo(pts[i].x,pts[i].y,(pts[i].x+pts[i+1].x)/2,(pts[i].y+pts[i+1].y)/2);
  mx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  mx.strokeStyle=col; mx.lineWidth=lw; mx.lineCap='round'; mx.lineJoin='round'; mx.stroke();
}
function offsetPts(pts,d){
  return pts.map((p,i)=>{
    const p0=pts[Math.max(0,i-1)], p1=pts[Math.min(pts.length-1,i+1)];
    const dx=p1.x-p0.x, dy=p1.y-p0.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    return {x:p.x+(-dy/len)*d, y:p.y+(dx/len)*d};
  });
}

// ── Background & scenery ──────────────────────────────────────────
function drawGrass(){
  mx.fillStyle='#4a8a30'; mx.fillRect(0,0,CW,CH);
  mx.fillStyle='#55a038';
  [[0,0,180,100],[200,0,120,80],[380,0,100,90],[520,0,90,100],
   [0,270,160,90],[200,280,120,80],[380,270,110,90],[520,270,90,90]].forEach(([x,y,w,h])=>mx.fillRect(x,y,w,h));
  mx.fillStyle='#3a7224';
  [[80,15,80,55],[310,20,80,50],[490,15,80,55],[50,295,80,55],[320,290,80,50],[495,295,70,55]].forEach(([x,y,w,h])=>mx.fillRect(x,y,w,h));
  mx.strokeStyle='#38681e'; mx.lineWidth=1.2;
  [30,80,130,175,215,262,302,342,382,425,465,505,545,580].forEach(x=>{
    [[x,50],[x+3,50],[x+6,50],[x,310],[x+3,310],[x+6,310]].forEach(([bx,by])=>{
      mx.beginPath(); mx.moveTo(bx,by); mx.lineTo(bx+2,by-7); mx.stroke();
    });
  });
}
function drawTree(tx,ty,r){
  mx.fillStyle='#00000028'; mx.beginPath(); mx.ellipse(tx+2,ty+3,r*.9,r*.5,0,0,Math.PI*2); mx.fill();
  mx.fillStyle='#2d6a1a'; mx.beginPath(); mx.arc(tx,ty,r,0,Math.PI*2); mx.fill();
  mx.fillStyle='#3c8226'; mx.beginPath(); mx.arc(tx-1,ty-1,r*.75,0,Math.PI*2); mx.fill();
  mx.fillStyle='#4e9e32'; mx.beginPath(); mx.arc(tx-2,ty-2,r*.46,0,Math.PI*2); mx.fill();
  mx.fillStyle='#68b84888'; mx.beginPath(); mx.arc(tx-3,ty-3,r*.2,0,Math.PI*2); mx.fill();
}
function drawMudRoad(){
  smoothStroke(RPTS,48,'#4a2e0888');
  smoothStroke(RPTS,40,'#8a6230');
  smoothStroke(RPTS,33,'#c09248');
  smoothStroke(RPTS,24,'#cca058');
  smoothStroke(RPTS,12,'#d8b26a');
  const left=offsetPts(RPTS,-8), right=offsetPts(RPTS,8);
  [left,right].forEach(tp=>{
    mx.beginPath(); mx.moveTo(tp[0].x,tp[0].y);
    for(let i=0;i<tp.length-1;i++)
      mx.quadraticCurveTo(tp[i].x,tp[i].y,(tp[i].x+tp[i+1].x)/2,(tp[i].y+tp[i+1].y)/2);
    mx.lineTo(tp[tp.length-1].x,tp[tp.length-1].y);
    mx.strokeStyle='#8a5e28'; mx.lineWidth=2; mx.setLineDash([14,10]); mx.lineCap='round'; mx.stroke(); mx.setLineDash([]);
  });
  mx.fillStyle='#9a7232';
  [[90,148],[105,135],[155,215],[165,235],[220,142],[235,158],
   [295,210],[305,225],[365,148],[375,163],[435,212],[445,228],[498,165],[510,150]].forEach(([px,py])=>{
    mx.beginPath(); mx.ellipse(px,py,3,2,Math.random()*Math.PI,0,Math.PI*2); mx.fill();
  });
}
function drawSign(n){
  const {x,y,nc,label,sub,ci}=n, done=coll[ci];
  mx.fillStyle='#6a4220';
  mx.beginPath(); mx.roundRect?mx.roundRect(x-3,y-46,6,46,2):mx.fillRect(x-3,y-46,6,46); mx.fill();
  mx.fillStyle='#00000030'; mx.beginPath();
  if(mx.roundRect)mx.roundRect(x-18,y-72,38,24,5); else mx.rect(x-18,y-72,38,24); mx.fill();
  mx.fillStyle=done?'#5a8a3a':nc; mx.shadowBlur=done?0:16; mx.shadowColor=nc;
  mx.beginPath();
  if(mx.roundRect)mx.roundRect(x-19,y-74,38,24,5); else mx.rect(x-19,y-74,38,24);
  mx.fill(); mx.shadowBlur=0;
  mx.strokeStyle=done?'#88cc44':lt(nc,.3); mx.lineWidth=1.5;
  mx.beginPath();
  if(mx.roundRect)mx.roundRect(x-19,y-74,38,24,5); else mx.rect(x-19,y-74,38,24); mx.stroke();
  mx.fillStyle='#fff'; mx.font=`bold 10px 'Segoe UI'`; mx.textAlign='center'; mx.textBaseline='middle';
  mx.fillText(done?'✓ '+label:label, x, y-62);
  mx.fillStyle=nc; mx.font=`bold 8px 'Segoe UI'`; mx.textBaseline='top'; mx.fillText(sub, x, y+6);
  mx.fillStyle=done?'#88cc44':nc; mx.shadowBlur=done?0:8; mx.shadowColor=nc;
  mx.beginPath(); mx.arc(x,y,7,0,Math.PI*2); mx.fill(); mx.shadowBlur=0;
  mx.fillStyle='#fff'; mx.font='bold 7px sans-serif'; mx.textBaseline='middle'; mx.fillText(done?'✓':'●', x, y);
}
function drawHome(n){
  const {x,y}=n;
  mx.shadowBlur=32; mx.shadowColor='#ffdd44'; mx.fillStyle='#ffe57022';
  mx.beginPath(); mx.arc(x,y-20,28,0,Math.PI*2); mx.fill(); mx.shadowBlur=0;
  mx.font='38px serif'; mx.textAlign='center'; mx.textBaseline='middle';
  mx.shadowBlur=20; mx.shadowColor='#ffcc44'; mx.fillText('🏡',x,y-22); mx.shadowBlur=0;
  mx.fillStyle='#ffdd44'; mx.font=`bold 9px 'Segoe UI'`; mx.textBaseline='top'; mx.fillText('A1 · HOME',x,y+6);
  mx.fillStyle='#ffdd44'; mx.shadowBlur=10; mx.shadowColor='#ffdd44';
  mx.beginPath(); mx.arc(x,y,7,0,Math.PI*2); mx.fill(); mx.shadowBlur=0;
}
function drawStartMark(n){
  const {x,y}=n;
  mx.font='22px serif'; mx.textAlign='center'; mx.textBaseline='middle'; mx.fillText('🚩',x,y-22);
  mx.fillStyle='#a5d6a7'; mx.font=`bold 8px 'Segoe UI'`; mx.textBaseline='top'; mx.fillText('START',x,y+6);
  mx.fillStyle='#a5d6a7'; mx.beginPath(); mx.arc(x,y,7,0,Math.PI*2); mx.fill();
}
function drawPlayer(){
  const av=AVS[avk], n=NODES[cur];
  mx.fillStyle='#00000030'; mx.beginPath(); mx.ellipse(n.x+2,n.y+3,18,10,0,0,Math.PI*2); mx.fill();
  mx.shadowBlur=24; mx.shadowColor=av.glow; mx.strokeStyle=av.glow; mx.lineWidth=2.5;
  mx.beginPath(); mx.arc(n.x,n.y,19,0,Math.PI*2); mx.stroke(); mx.shadowBlur=0;
  mx.fillStyle='#051a05'; mx.beginPath(); mx.arc(n.x,n.y,17,0,Math.PI*2); mx.fill();
  mx.font='22px serif'; mx.textAlign='center'; mx.textBaseline='middle'; mx.fillText(av.emoji,n.x,n.y+1);
}

// ── Full render ───────────────────────────────────────────────────
function render(){
  mx.clearRect(0,0,CW,CH);
  drawGrass();
  TREES.forEach(t=>drawTree(t.x,t.y,t.r));
  drawMudRoad();
  NODES.forEach(n=>{
    if(n.t==='start') drawStartMark(n);
    else if(n.t==='cp') drawSign(n);
    else if(n.t==='home') drawHome(n);
  });
  drawPlayer();
}

// ── Journey bar ───────────────────────────────────────────────────
function updateJourney(){
  [0,1,2].forEach(i=>document.getElementById('j'+i).classList.toggle('lit',coll[i]));
  if(coll.every(Boolean)&&cur===4) document.getElementById('j3').classList.add('lit');
}

// ── Win ───────────────────────────────────────────────────────────
function showWin(){
  if(document.getElementById('win').classList.contains('show')) return;
  portrait(document.getElementById('wc'),AVS[avk]);
  document.getElementById('wmsg').textContent = AVS[avk].name + ' completed all tasks and reached home!';
  document.getElementById('j3').classList.add('lit');
  document.getElementById('win').classList.add('show');
}

// ── Screen flow ───────────────────────────────────────────────────
function startGame(k){
  avk = k;
  document.getElementById('avs').classList.add('out');
  setTimeout(()=>document.getElementById('avs').style.display='none',500);
  document.getElementById('game').classList.add('on');
  portrait(document.getElementById('badge'),AVS[k],true);
  document.getElementById('bname').textContent = AVS[k].name;
  loadState();
  renderNotepad();
  renderCalendar();
  syncAvatar();
}

function restartGame(){
  document.getElementById('win').classList.remove('show');
  todayTasks.forEach(t => { t.done = false; });
  saveState();
  [0,1,2,3].forEach(i=>document.getElementById('j'+i).classList.remove('lit'));
  editMode = false;
  document.getElementById('btn-edit').classList.remove('active');
  renderNotepad();
  syncAvatar();
}

function goSelect(){
  document.getElementById('win').classList.remove('show');
  document.getElementById('game').classList.remove('on');
  const s=document.getElementById('avs');
  s.style.display='flex'; s.style.opacity='1'; s.classList.remove('out');
}

buildCards();
</script>
